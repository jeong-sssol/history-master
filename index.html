<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>히스토리 마스터: 게이트웨이 포털</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root { --pk-green: #4DAD5B; --pk-blue: #3A83F6; --pk-red: #EE5253; --pk-yellow: #FFC312; --pk-dark: #2f3640; --pk-gray: #dcdde1; }
        * { box-sizing: border-box; }
        body { 
            margin: 0; padding: 20px; font-family: 'Noto Sans KR', sans-serif; color: var(--pk-dark);
            background: linear-gradient(rgba(240, 244, 248, 0.75), rgba(240, 244, 248, 0.75)), url('https://images.unsplash.com/photo-1618005182384-a83a8bd57fbe?q=80&w=1964&auto=format&fit=crop');
            background-size: cover; background-position: center; background-attachment: fixed;
            min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center;
        }
        .portal-container { 
            width: 95vw; max-width: 500px; background: rgba(255,255,255,0.96); border-radius: 25px; 
            padding: 40px 30px; box-shadow: 0 15px 35px rgba(0,0,0,0.15); border: 4px solid var(--pk-blue); text-align: center;
        }
        .poke-logo { width: 110px; height: 120px; object-fit: contain; margin-bottom: 15px; }
        .portal-container h1 { margin: 0 0 10px 0; font-size: 32px; font-weight: 900; color: var(--pk-dark); letter-spacing: -1px; }
        .portal-container h1 span { color: var(--pk-blue); }
        .portal-container p { margin: 0 0 35px 0; font-size: 16px; color: #666; font-weight: bold; word-break: keep-all; }
        
        .portal-btn {
            display: block; width: 100%; padding: 18px; margin-bottom: 18px; font-size: 18px; font-weight: 900;
            color: white; border: none; border-radius: 15px; cursor: pointer; text-decoration: none;
            transition: transform 0.2s, box-shadow 0.2s; text-align: center; box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        .portal-btn:all-items { transform: scale(1.02); }
        .portal-btn:active { transform: scale(0.98); box-shadow: none; }
        
        .btn-master { background: var(--pk-dark); box-shadow: 0 4px 0 #1e232b; color: var(--pk-yellow); border: 2px solid var(--pk-yellow); }
        .btn-gym { background: var(--pk-blue); box-shadow: 0 4px 0 #2966c7; }
        .btn-challenger { background: var(--pk-green); box-shadow: 0 4px 0 #27ae60; }
        
        .footer-credit { margin-top: 25px; font-size: 12px; color: #a4b0be; font-weight: bold; letter-spacing: 1px; }
    </style>
</head>
<body>

    <div class="portal-container">
        <img src="https://upload.wikimedia.org/wikipedia/commons/5/51/Pokebola-pokeball-png-0.png" class="poke-logo" alt="Logo">
        <h1>히스토리 <span>마스터</span></h1>
        <p>역사 체육관 배틀 플랫폼 게이트웨이에 오신 것을 환영합니다!</p>
        
        <!-- 네틀리파이에 같은 폴더로 올릴 것이기 때문에 상대경로로 완벽하게 연결됩니다 -->
        <a href="./master_admin.html" class="portal-btn btn-master">👑 마스터 제어 센터 (교사 전용)</a>
        <a href="./gym_admin.html" class="portal-btn btn-gym">🏛️ 체육관 관장 모드 (출제/방어전)</a>
        <a href="./challenger.html" class="portal-btn btn-challenger">⚔️ 도전자 월드 (배틀전)</a>
        
        <div class="footer-credit">HISTORY MASTER CLASS ECOSYSTEM v3<br><br>ⓒJeong_sssol</div>
    </div>

</body>
</html>
