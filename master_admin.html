<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>히스토리 마스터: 마스터 제어 센터 V46</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;700;900&display=swap" rel="stylesheet">
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>

    <style>
        :root { --pk-green: #4DAD5B; --pk-blue: #3A83F6; --pk-red: #EE5253; --pk-yellow: #FFC312; --pk-dark: #2f3640; --pk-gray: #dcdde1; }
        * { box-sizing: border-box; }
        body { margin: 0; padding: 20px; font-family: 'Noto Sans KR', sans-serif; color: var(--pk-dark); background: linear-gradient(rgba(240, 244, 248, 0.75), rgba(240, 244, 248, 0.75)), url('https://images.unsplash.com/photo-1618005182384-a83a8bd57fbe?q=80&w=1964&auto=format&fit=crop'); background-size: cover; background-position: center; background-attachment: fixed; min-height: 100dvh; display: flex; flex-direction: column; align-items: center; }
        .hidden { display: none !important; }
        .container { width: 95vw; max-width: 1400px; background: rgba(255,255,255,0.96); border-radius: 20px; padding: 25px; box-shadow: 0 15px 35px rgba(0,0,0,0.1); border: 4px solid var(--pk-blue); }
        .lock-screen { text-align: center; padding: 50px 20px; }
        .lock-screen input { width: 250px; padding: 12px; font-size: 18px; text-align: center; border: 2px solid var(--pk-gray); border-radius: 8px; margin-bottom: 15px; }
        .setup-box { background: #fff; border: 2px solid var(--pk-gray); border-radius: 15px; padding: 25px; margin-bottom: 20px; }
        .setup-box h3 { margin-top: 0; color: var(--pk-blue); border-bottom: 2px dashed #ccc; padding-bottom: 10px; font-size: 22px; font-weight: 900; }
        .input-group { margin-bottom: 15px; }
        .input-group label { display: block; font-weight: bold; margin-bottom: 5px; color: #555; }
        .input-group input, .input-group select { width: 100%; padding: 12px; border: 2px solid #ddd; border-radius: 8px; font-size: 16px; }
        
        /* ★ CSS 원상 복구: 버튼 크기 폰트 16px, 상하 패딩 12px 복구! (줄바꿈 방지 nowrap 유지) */
        .btn { font-family: 'Noto Sans KR', sans-serif; font-weight: 900; font-size: 16px; padding: 12px 18px; border: none; border-radius: 10px; cursor: pointer; transition: 0.2s; box-shadow: 0 4px 6px rgba(0,0,0,0.1); white-space: nowrap; }
        .btn:active { transform: scale(0.98); }
        .btn-full { width: 100%; font-size: 24px; background: var(--pk-blue); color: white; margin-top: 10px; padding: 15px; }
        .header-section { text-align: center; margin-bottom: 20px; border-bottom: 2px solid #eee; padding-bottom: 20px; }
        .timer-box { background: #fff; color: var(--pk-red); display: inline-block; padding: 5px 35px; border-radius: 15px; border: 4px solid var(--pk-red); font-size: 65px; font-weight: 900; letter-spacing: 2px; }
        
        .control-btns { margin-top: 15px; display: flex; justify-content: center; gap: 10px; flex-wrap: wrap; }
        .btn-start { background: var(--pk-green); color: white; }
        .btn-stop { background: var(--pk-dark); color: white; }
        .btn-modify { background: #4b5563; color: white; }
        .btn-save { background: var(--pk-blue); color: white; }
        .btn-report { background: #107C41; color: white; }
        .btn-excel-all { background: #f39c12; color: white; }
        .btn-reset { background: var(--pk-red); color: white; }
        
        .dashboard-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(320px, 1fr)); gap: 20px; }
        
        .gym-card { background: #fff; border: 2px solid #e1e8ef; border-radius: 16px; padding: 12px 18px; display: flex; flex-direction: column; justify-content: space-between; min-height: 115px; height: auto; box-shadow: 0 6px 12px rgba(0,0,0,0.04); position: relative; transition: all 0.3s ease; }
        
        .gym-card.ready { border: 3px solid #74b9ff; background: #f4f9ff; box-shadow: 0 6px 15px rgba(58, 131, 246, 0.15); }

        .card-top { display: flex; align-items: flex-start; justify-content: space-between; height: 100%; margin-top: 5px; }
        .name-area { display: flex; align-items: flex-start; gap: 10px; flex-grow: 1; min-width: 0; padding-right: 25px; }
        .poke-icon { width: 55px; height: 55px; object-fit: contain; flex-shrink: 0; }
        .name-area h3 { margin: 0; font-size: 17px; font-weight: 900; color: var(--pk-dark); word-break: keep-all; white-space: normal; line-height: 1.3; margin-top: 2px; }
        .score-badge { color: var(--pk-blue); font-size: 38px; font-weight: 900; text-align: right; min-width: 70px; flex-shrink: 0; line-height: 1.2; }
        .score-badge.negative { color: var(--pk-red); } 
        .card-bottom { display: flex; align-items: center; gap: 12px; margin-top: 5px; }
        .track { background: #f1f2f6; height: 10px; border-radius: 10px; overflow: hidden; flex-grow: 1; }
        .bar-fill { height: 100%; background: linear-gradient(90deg, #7bed9f, #2ed573); border-radius: 10px; transition: width 0.5s ease; }
        .bar-fill.time-attack { background: linear-gradient(90deg, #f6e58d, #f9ca24); width: 100% !important; }
        .progress-text { margin: 0; font-size: 13px; font-weight: bold; color: #a4b0be; white-space: nowrap; }
        .progress-text.time-attack { color: #f0932b; font-weight: 900; }
        
        .gym-action-group { position: absolute; top: 12px; right: 15px; display: flex; gap: 10px; align-items: center; z-index: 10; }
        .btn-icon { background: none; border: none; color: #cbd5e1; font-size: 18px; cursor: pointer; transition: 0.2s; padding: 0; line-height: 1; font-weight: bold; display: flex; align-items: center; justify-content: center; }
        .btn-icon.reset:hover { color: var(--pk-blue); transform: scale(1.3); }
        .btn-icon.delete:hover { color: var(--pk-red); transform: scale(1.3); }

        .modal { position: fixed; inset: 0; background: rgba(0,0,0,0.7); display: flex; align-items: center; justify-content: center; z-index: 100; opacity: 0; pointer-events: none; transition: 0.3s; padding: 20px;}
        .modal.open { opacity: 1; pointer-events: auto; }
        .modal-content { background: white; width: 100%; max-width: 500px; border-radius: 20px; padding: 25px; transform: translateY(20px); transition: 0.3s; position: relative; max-height: 90vh; overflow-y: auto;}
        .modal.open .modal-content { transform: translateY(0); }
        .close-modal { position: absolute; top: 15px; right: 20px; background: none; border: none; font-size: 28px; cursor: pointer; color: #bbb; font-weight: bold; }
        .report-list { display: flex; flex-direction: column; gap: 10px; margin-top: 15px; }
        .report-item { background: #f8f9fa; border: 1px solid #ddd; border-radius: 10px; padding: 15px; display: flex; justify-content: space-between; align-items: center; cursor: pointer; transition: 0.2s; }
        .report-item:hover { background: #eef2ff; border-color: var(--pk-blue); }
        .report-info h4 { margin: 0 0 5px 0; font-size: 16px; color: var(--pk-dark); }
        .report-info p { margin: 0; font-size: 13px; color: #888; font-weight: bold; }
        .result-table { width: 100%; border-collapse: collapse; margin-top: 15px; }
        .result-table th, .result-table td { padding: 12px; text-align: center; border-bottom: 1px solid #eee; font-size: 15px; }
        .result-table th { background: #f8f9fa; color: #555; font-weight: bold; }
        .result-table tr:nth-child(1) td { font-weight: 900; color: var(--pk-red); font-size: 18px; } 
        .result-table tr:nth-child(2) td { font-weight: 900; color: var(--pk-blue); } 

        .sidebar {
            position: fixed; top: 0; right: -400px; width: 350px; height: 100%;
            background: #fff; box-shadow: -5px 0 15px rgba(0,0,0,0.1);
            z-index: 9999; transition: right 0.3s ease; padding: 20px; overflow-y: auto;
        }
        .sidebar.open { right: 0; }
        .sidebar-close-btn { font-size: 28px; border: none; background: none; cursor: pointer; float: right; color: #999; }
        .sidebar-close-btn:hover { color: var(--pk-red); }
        .sidebar-table { width: 100%; border-collapse: collapse; font-size: 14px; margin-top: 15px; text-align: center; }
        .sidebar-table th, .sidebar-table td { padding: 10px; border-bottom: 1px solid #eee; }
        .sidebar-table th { background: #f8f9fa; font-weight: 900; color: var(--pk-dark); }

        /* 체육관 관리 모달 내 라운드 탭 버튼 스타일 */
        .round-tab-container { display: flex; gap: 8px; margin-bottom: 15px; overflow-x: auto; padding-bottom: 5px; }
        .round-tab { padding: 8px 16px; border-radius: 8px; font-size: 14px; font-weight: bold; cursor: pointer; border: 2px solid var(--pk-border); background: white; color: #636e72; transition: 0.2s; white-space: nowrap; }
        .round-tab:hover { background: #f1f2f6; }
        .round-tab.active { background: var(--pk-blue); color: white; border-color: var(--pk-blue); }
    </style>
</head>
<body>
    <div style="position: relative; display: flex; align-items: center; justify-content: center; margin-bottom: 25px; width: 95vw; max-width: 1400px;">
        <a href="./index.html" style="position: absolute; left: 0; text-decoration: none; font-size: 22px; background: #fff; width: 45px; height: 42px; display: flex; align-items: center; justify-content: center; border-radius: 10px; border: 2px solid var(--pk-gray); transition: 0.2s; box-shadow: 0 4px 6px rgba(0,0,0,0.05);" onmouseover="this.style.background='#eee'" onmouseout="this.style.background='#fff'" title="대기실로 돌아가기">🏠</a>
        <h1 style="text-align: center; color: var(--pk-dark); font-size: 36px; font-weight: 900; margin: 0;">히스토리 마스터: 체육관 배틀 <span style="color: var(--pk-blue);">관리자</span></h1>
        
        <button id="btnSidebar" class="hidden" onclick="toggleSidebar()" style="position: absolute; right: 0; font-size: 32px; background: none; border: none; cursor: pointer; color: #a0aab2; font-weight: bold; transition: 0.2s;" onmouseover="this.style.color='#636e72'" onmouseout="this.style.color='#a0aab2'" title="종합 순위 보기">&#9776;</button>
    </div>

    <div id="scoreSidebar" class="sidebar">
        <button class="sidebar-close-btn" onclick="toggleSidebar()">&times;</button>
        <h2 style="margin-top: 0; color: var(--pk-dark); font-weight: 900;">📊 종합 순위판</h2>
        <p style="font-size: 13px; color: #888; margin-bottom: 15px;">누적 합계 점수 기준으로 정렬됩니다.</p>
        <table class="sidebar-table">
            <thead><tr><th>체육관(모둠)</th><th>R1</th><th>R2</th><th>합계</th></tr></thead>
            <tbody id="sidebarTbody">
            </tbody>
        </table>
    </div>

    <div class="container" id="viewLock">
        <div class="lock-screen">
            <h2 style="font-size: 28px; margin-bottom: 10px;">🔑 마스터 제어실 접속</h2>
            <p style="color: #666; margin-bottom: 25px;">교사 전용 마스터 인증 코드를 입력하세요.</p>
            <input type="password" id="masterPin" placeholder="인증 비밀번호 입력">
            <br><button class="btn btn-start" style="width: 250px; padding: 14px; font-size: 18px;" onclick="verifyMaster()">접속하기</button>
        </div>
    </div>

    <div class="container hidden" id="setupScreen">
        <div class="setup-box">
            <h3>⚙️ 배틀 환경 및 규칙 설정</h3>
            <div style="display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px;">
                <div class="input-group"><label>참여 체육관 수</label><input type="number" id="groupCount" value="6" min="2" max="12"></div>
                <div class="input-group"><label>배틀 제한 시간 (분)</label><input type="number" id="timeLimit" value="7" min="1" max="30"></div>
                <div class="input-group"><label style="color:var(--pk-red);">체육관당 최대 풀이 가능 문항 수</label><input type="text" id="maxSolvePerGym" value="3" placeholder="숫자 입력 또는 * (무제한)"></div>
            </div>
            <div style="display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px; margin-top: 15px; padding-top: 15px; border-top: 1px dashed #eee;">
                <div class="input-group" style="background:#fff0f0; padding:15px; border-radius:10px; border:2px solid #ffcccc;"><label style="color: var(--pk-red);">💥 폭탄 배점 (-5 ~ -1)</label><select id="scoreMinusVal"><option value="-5" selected>-5점</option><option value="-4">-4점</option><option value="-3">-3점</option><option value="-2">-2점</option><option value="-1">-1점</option></select><label style="margin-top:10px;">폭탄 문항 수</label><input type="number" id="scoreMinusCount" value="2" min="0"></div>
                <div class="input-group" style="background:#f0f7ff; padding:15px; border-radius:10px; border:2px solid #cce0ff;"><label style="color: var(--pk-blue);">📘 일반 배점 (1 ~ 5)</label><select id="scorePlus3Val"><option value="1">+1점</option><option value="2">+2점</option><option value="3" selected>+3점</option><option value="4">+4점</option><option value="5">+5점</option></select><label style="margin-top:10px;">일반 문항 수</label><input type="number" id="scorePlus3Count" value="7" min="0"></div>
                <div class="input-group" style="background:#fffde6; padding:15px; border-radius:10px; border:2px solid #ffebb3;"><label style="color: #d49a00;">🌟 대박 배점 (5 ~ 10)</label><select id="scorePlus5Val"><option value="5" selected>+5점</option><option value="6">+6점</option><option value="7">+7점</option><option value="8">+8점</option><option value="9">+9점</option><option value="10">+10점</option></select><label style="margin-top:10px;">대박 문항 수</label><input type="number" id="scorePlus5Count" value="1" min="0"></div>
            </div>
            <div class="input-group" style="margin-top:15px;"><label>각 모둠당 총 출제해야 할 문항 수 (자동 계산)</label><input type="number" id="totalQuestions" value="10" readonly style="background:#eee; font-weight:bold; color:var(--pk-blue);"></div>
        </div>
        <button class="btn btn-full" onclick="completeSetup()">설정 완료 및 배틀 전광판 오픈</button>
    </div>

    <div class="container hidden" id="dashboardScreen">
        <div class="header-section">
            <div class="timer-box" id="globalTimer">07:00</div>
            <div class="control-btns">
                <button class="btn btn-start" onclick="startTimer()">▶ 배틀 시작</button>
                <button class="btn btn-stop" onclick="stopBattle()">■ 강제 종료</button>
                <button class="btn btn-modify" onclick="backToSetup()">🛠️ 설정 수정</button>
                <button class="btn btn-save" onclick="saveAndResetRound()">💾 결과 저장/R리셋</button>
                <button class="btn btn-report" onclick="openReportBoardModal()">📋 배틀 리포트</button>
                <button class="btn btn-excel-all" onclick="downloadAllRoundsExcel()">📊 종합 엑셀</button>
                <button class="btn btn-reset" onclick="resetClassData()">💥 학급 리셋</button>
                <button class="btn btn-modify" style="background-color: #636e72;" onclick="openGymManageModal()">🛠️ 체육관 관리</button>
            </div>
        </div>
        <p id="emptyMsg" style="text-align:center; color:#888; font-weight:bold; font-size:18px; margin-top:40px; display:none;">⏳ 학생들의 체육관 개설을 기다리는 중입니다...</p>
        <div class="dashboard-grid" id="gridChart"></div>
    </div>

    <div id="modalGymManage" class="modal" style="z-index: 105;">
        <div class="modal-content" style="max-width: 950px;"> <button class="close-modal" onclick="closeModal('modalGymManage')">&times;</button>
            <h3 style="margin: 0 0 15px 0; font-size: 20px; font-weight: 900; color: var(--pk-blue); border-bottom: 2px dashed #eee; padding-bottom:10px;">🛠️ 체육관 상세 관리</h3>
            <p style="font-size: 13px; color: #888; margin-top:0;">라운드 탭을 선택하고, 이름을 클릭하여 출제된 문제와 실시간 통계를 확인하세요.</p>
            
            <div id="gymManageTabs" class="round-tab-container"></div>
            
            <div id="gymManageContainer" style="display: flex; flex-direction: column; gap: 10px;">
                </div>
        </div>
    </div>

    <div id="modalReportBoard" class="modal">
        <div class="modal-content">
            <button class="close-modal" onclick="closeModal('modalReportBoard')">&times;</button>
            <h3 style="margin: 0 0 15px 0; font-size: 22px; font-weight: 900; color: var(--pk-dark); border-bottom: 2px dashed #eee; padding-bottom:10px;">📊 배틀 리포트</h3>
            <div class="report-list" id="reportListArea"></div>
        </div>
    </div>

    <div id="modalReportDetail" class="modal" style="z-index: 105;">
        <div class="modal-content">
            <button class="close-modal" onclick="closeModal('modalReportDetail')">&times;</button>
            <h3 id="modalReportTitle" style="margin: 0 0 5px 0; font-size: 20px; font-weight: 900; color: var(--pk-blue);">배틀 결과 리포트</h3>
            <p id="modalReportDate" style="margin: 0 0 20px 0; font-size: 14px; color: #888; font-weight: bold;">저장 일시: -</p>
            <div style="background: #f8f9fa; border-radius: 12px; border: 2px solid var(--pk-border); overflow: hidden;">
                <table class="result-table">
                    <thead><tr><th>순위</th><th>도전자 모둠명</th><th>최종 획득 점수</th></tr></thead>
                    <tbody id="reportTableBody"></tbody>
                </table>
            </div>
            <div style="margin-top: 20px;">
                <button class="btn btn-report" id="btnDownloadSingleExcel" style="width:100%; padding:15px; font-size:16px;">상세 분석 엑셀 다운로드 ⤓</button>
            </div>
        </div>
    </div>

    <script>
        const firebaseConfig = {
          apiKey: "AIzaSyBoenwe9SJGEtGv8iAXKHhL_ZuW9tC9Sy8",
          authDomain: "history-master-cc32c.firebaseapp.com",
          databaseURL: "https://history-master-cc32c-default-rtdb.firebaseio.com",
          projectId: "history-master-cc32c",
          storageBucket: "history-master-cc32c.firebasestorage.app",
          messagingSenderId: "651057510611",
          appId: "1:651057510611:web:69cd05ee6c8ce4c5edfc26"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        let timerInterval; let timeLeft = 0; let currentRound = 1;
        let globalGroupCount = 6; 
        let globalRequiredQuestions = 10;
        
        const pokeSprites = ["133", "039", "175", "151", "025", "007", "004", "001", "094", "143", "054", "137", "150", "149", "129"];
        let currentGymsData = {}; let allReports = {}; 

        function verifyMaster() {
            if(document.getElementById('masterPin').value === "history123") {
                document.getElementById('viewLock').classList.add('hidden');
                document.getElementById('setupScreen').classList.remove('hidden');
            } else { alert("⛔ 비밀번호 오류!"); }
        }

        document.querySelectorAll('input[type="number"]').forEach(input => {
            input.addEventListener('input', () => {
                if(input.id.includes('Count')) {
                    const mC = parseInt(document.getElementById('scoreMinusCount').value) || 0;
                    const p3C = parseInt(document.getElementById('scorePlus3Count').value) || 0;
                    const p5C = parseInt(document.getElementById('scorePlus5Count').value) || 0;
                    document.getElementById('totalQuestions').value = mC + p3C + p5C;
                }
            });
        });

        document.querySelectorAll('input').forEach(input => {
            input.addEventListener('blur', () => { setTimeout(() => window.scrollTo(0, 0), 100); });
        });

        function completeSetup() {
            const total = parseInt(document.getElementById('totalQuestions').value);
            if (total <= 0) return alert("총 문항 수가 최소 1개는 되어야 합니다!");
            globalRequiredQuestions = total;
            
            let rawMaxSolve = document.getElementById('maxSolvePerGym').value.trim();
            let parsedMaxSolve;
            if(rawMaxSolve === '*') {
                parsedMaxSolve = '*';
            } else {
                parsedMaxSolve = parseInt(rawMaxSolve);
                if(isNaN(parsedMaxSolve) || parsedMaxSolve < 1) return alert("최대 풀이 가능 문항 수는 숫자 또는 '*'만 입력할 수 있습니다.");
            }

            globalGroupCount = parseInt(document.getElementById('groupCount').value) || 6;

            document.getElementById('setupScreen').classList.add('hidden');
            document.getElementById('dashboardScreen').classList.remove('hidden');
            
            document.getElementById('btnSidebar').classList.remove('hidden');

            timeLeft = document.getElementById('timeLimit').value * 60;
            updateDisplay();
            db.ref('globalConfig').update({
                timeLimitMin: parseInt(document.getElementById('timeLimit').value),
                maxSolvePerGym: parsedMaxSolve, 
                groupCount: globalGroupCount,
                totalRequiredQuestions: globalRequiredQuestions,
                status: 'setup',
                timestamp: Date.now()
            });
            renderFirebaseGrid();
        }

        db.ref('globalConfig').on('value', snap => {
            const config = snap.val();
            if(config) {
                if(config.groupCount) globalGroupCount = config.groupCount;
                if(config.currentRound) currentRound = config.currentRound;
                if(config.totalRequiredQuestions) globalRequiredQuestions = config.totalRequiredQuestions;
            }
        });

        function backToSetup() {
            document.getElementById('dashboardScreen').classList.add('hidden');
            document.getElementById('setupScreen').classList.remove('hidden');
            document.getElementById('btnSidebar').classList.add('hidden');
            clearInterval(timerInterval); timerInterval = null;
            db.ref('globalConfig').update({ status: 'setup', timestamp: Date.now() });
        }

        function startTimer() { 
            if(timerInterval) return; 
            db.ref('globalConfig').update({ 
                status: 'start', 
                timeLeft: timeLeft,
                startTimestamp: Date.now() 
            });
            timerInterval = setInterval(() => { 
                if(timeLeft > 0) { timeLeft--; updateDisplay(); } else { stopBattle(); } 
            }, 1000); 
        }
        
        function stopBattle() { 
            clearInterval(timerInterval); timerInterval = null; 
            timeLeft = 0; updateDisplay(); 
            db.ref('globalConfig').update({ status: 'stop' });
            alert("제한시간 마감! 전 기기의 조작이 정지됩니다."); 
        }

        function updateDisplay() {
            let m = Math.floor(timeLeft / 60).toString().padStart(2, '0'); let s = (timeLeft % 60).toString().padStart(2, '0');
            document.getElementById('globalTimer').innerText = `${m}:${s}`;
        }

        db.ref('gyms').on('value', (snapshot) => { 
            currentGymsData = snapshot.val() || {}; 
            if(!document.getElementById('dashboardScreen').classList.contains('hidden')) renderFirebaseGrid(); 
            updateSidebar(); 
        });
        
        db.ref('reports').on('value', (snapshot) => { 
            allReports = snapshot.val() || {}; 
            if (document.getElementById('modalReportBoard').classList.contains('open')) openReportBoardModal();
            updateSidebar(); 
        });

        function renderFirebaseGrid() {
            const grid = document.getElementById('gridChart'); grid.innerHTML = ""; 
            
            const gymKeys = Object.keys(currentGymsData)
                .filter(k => k !== 'undefined' && k !== 'null' && k.trim() !== '')
                .slice(0, globalGroupCount);
                
            const emptyMsg = document.getElementById('emptyMsg');
            if(gymKeys.length === 0) { emptyMsg.style.display = 'block'; return; } else { emptyMsg.style.display = 'none'; }
            
            const rawMaxSolve = document.getElementById('maxSolvePerGym').value.trim();
            const isTimeAttack = (rawMaxSolve === '*');
            const maxPerGym = isTimeAttack ? 999 : (parseInt(rawMaxSolve) || 3);
            const maxQuestions = isTimeAttack ? 999 : (globalGroupCount - 1) * maxPerGym; 

            const sortedGymNamesForIcon = [...gymKeys].sort();

            let teamStats = {};
            gymKeys.forEach(g => { teamStats[g] = { score: 0, solved: 0 }; }); 

            gymKeys.forEach(gName => {
                const gym = currentGymsData[gName];
                if(gym.requests) {
                    Object.values(gym.requests).forEach(req => {
                        if(req.status === 'completed') {
                            if(!teamStats[req.team]) teamStats[req.team] = { score: 0, solved: 0 };
                            teamStats[req.team].score += (req.scoreDelta || 0);
                            teamStats[req.team].solved++;
                        }
                    });
                }
            });

            const sortedTeams = Object.keys(teamStats).sort((a, b) => {
                if (teamStats[b].score !== teamStats[a].score) return teamStats[b].score - teamStats[a].score;
                return teamStats[b].solved - teamStats[a].solved;
            });

            sortedTeams.forEach((teamName) => {
                const stats = teamStats[teamName];
                const gym = currentGymsData[teamName];
                
                const qCount = gym && gym.questions ? Object.keys(gym.questions).filter(k=>gym.questions[k]!==null).length : 0;
                const isReady = qCount >= globalRequiredQuestions;

                let progressPercent = 0;
                let progressText = "";
                let barClass = "bar-fill";
                let textClass = "progress-text";
                
                if(isTimeAttack) {
                    progressPercent = 100; 
                    progressText = `${stats.solved}개 완료 (타임어택🚀)`;
                    barClass = "bar-fill time-attack";
                    textClass = "progress-text time-attack";
                } else {
                    progressPercent = (stats.solved / maxQuestions) * 100; 
                    if(progressPercent > 100) progressPercent = 100;
                    progressText = `${stats.solved}/${maxQuestions} 완료`;
                }

                const uniqueIndex = sortedGymNamesForIcon.indexOf(teamName);
                const pokeIconIdx = uniqueIndex % pokeSprites.length;

                const card = document.createElement('div'); 
                card.className = `gym-card ${isReady ? 'ready' : ''}`;
                
                card.innerHTML = `
                    <div class="gym-action-group">
                        <button class="btn-icon reset" onclick="resetGymPassword('${teamName}')" title="비밀번호 1111로 초기화">&#8635;</button>
                        <button class="btn-icon delete" onclick="deleteGym('${teamName}')" title="체육관 삭제">✖</button>
                    </div>
                    <div class="card-top">
                        <div class="name-area">
                            <img src="https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/other/official-artwork/${parseInt(pokeSprites[pokeIconIdx], 10)}.png" class="poke-icon">
                            <h3 title="${teamName}">${teamName}</h3>
                        </div>
                        <div class="score-badge ${stats.score < 0 ? 'negative' : ''}">${stats.score > 0 ? '+'+stats.score : stats.score}</div>
                    </div>
                    <div class="card-bottom">
                        <div class="track"><div class="${barClass}" style="width: ${progressPercent}%;"></div></div>
                        <p class="${textClass}">${progressText}</p>
                    </div>
                `;
                grid.appendChild(card);
            });
        }

        function toggleSidebar() {
            document.getElementById('scoreSidebar').classList.toggle('open');
        }

        function updateSidebar() {
            const tbody = document.getElementById('sidebarTbody');
            if(!tbody) return;
            tbody.innerHTML = '';

            let teamScores = {};
            const validTeams = Object.keys(currentGymsData)
                .filter(k => k !== 'undefined' && k !== 'null' && k.trim() !== '')
                .slice(0, globalGroupCount);
            
            validTeams.forEach(t => teamScores[t] = { r1: 0, r2: 0, current: 0 });

            Object.values(currentGymsData).forEach(gym => {
                if(gym.requests) {
                    Object.values(gym.requests).forEach(req => {
                        if(req.status === 'completed' && teamScores[req.team]) {
                            teamScores[req.team].current += (req.scoreDelta || 0);
                        }
                    });
                }
            });

            Object.values(allReports).forEach(rep => {
                const rIdx = rep.roundIndex || 1;
                Object.keys(rep.scores || {}).forEach(t => {
                    if(teamScores[t]) {
                        if(rIdx === 1) teamScores[t].r1 += rep.scores[t];
                        else if(rIdx === 2) teamScores[t].r2 += rep.scores[t];
                    }
                });
            });

            validTeams.forEach(t => {
                if(currentRound === 1) teamScores[t].r1 += teamScores[t].current;
                else if(currentRound === 2) teamScores[t].r2 += teamScores[t].current;
                teamScores[t].total = teamScores[t].r1 + teamScores[t].r2;
            });

            const sorted = validTeams.map(t => ({ name: t, ...teamScores[t] })).sort((a,b) => b.total - a.total);
            
            sorted.forEach((t, idx) => {
                const isTop = idx === 0 ? 'background:#fffdf0; font-weight:bold;' : '';
                tbody.innerHTML += `
                    <tr style="${isTop}">
                        <td style="font-weight:bold; text-align:left; padding-left:15px;">${idx+1}. ${t.name}</td>
                        <td>${t.r1}</td>
                        <td>${t.r2}</td>
                        <td style="color:var(--pk-red); font-weight:900; font-size:16px;">${t.total}</td>
                    </tr>
                `;
            });
        }

        // =========================================================================
        // ★ 체육관 관리 모달 로직 (탭 스위칭 + 터치 지원 비밀번호 + 가독성 극대화)
        // =========================================================================
        function openGymManageModal() { 
            document.getElementById('modalGymManage').classList.add('open'); 
            renderGymManageTabs();
            renderGymManageContent(currentRound); 
        }
        function closeModal(id) { document.getElementById(id).classList.remove('open'); }

        function renderGymManageTabs() {
            const tabContainer = document.getElementById('gymManageTabs');
            tabContainer.innerHTML = '';
            for(let i = 1; i <= currentRound; i++) {
                const btn = document.createElement('button');
                btn.className = 'round-tab';
                btn.id = 'manageTab_' + i;
                btn.innerText = i + '라운드';
                btn.onclick = () => renderGymManageContent(i);
                tabContainer.appendChild(btn);
            }
        }

        function renderGymManageContent(targetRound) {
            for(let i = 1; i <= currentRound; i++) {
                const btn = document.getElementById('manageTab_' + i);
                if(btn) {
                    if(i === targetRound) btn.classList.add('active');
                    else btn.classList.remove('active');
                }
            }

            const container = document.getElementById('gymManageContainer');
            container.innerHTML = '';

            const isPast = targetRound < currentRound;

            if(!isPast) {
                // [현재 라운드]
                const validGyms = Object.keys(currentGymsData).filter(k => k !== 'undefined' && k !== 'null' && k.trim() !== '').slice(0, globalGroupCount);
                if(validGyms.length === 0) { container.innerHTML = '<p style="text-align:center; color:#999;">현재 라운드의 체육관 데이터가 없습니다.</p>'; return; }

                validGyms.forEach(gName => {
                    const gym = currentGymsData[gName];
                    const qCount = gym.questions ? Object.keys(gym.questions).filter(k=>gym.questions[k]!==null).length : 0;
                    
                    let att = 0, corr = 0; 
                    if(gym.requests) {
                        Object.values(gym.requests).forEach(req => {
                            if(req.status === 'completed') { att++; if(req.isCorrect) corr++; }
                        });
                    }
                    
                    const wrongCount = att - corr;
                    const defenseRate = att === 0 ? 0 : Math.round((wrongCount / att) * 100);

                    let qHtml = '';
                    if(gym.questions) {
                        const qArray = Array.isArray(gym.questions) ? gym.questions : Object.values(gym.questions);
                        // ★ 통계 열(도전, 정답, 오답)의 넓이를 12%로 줄여서 1열(문제)에 공간 확보
                        qHtml += `<table style="width:100%; border-collapse:collapse; text-align:center; font-size:13px; border:1px solid #dfe6e9;">
                                    <thead><tr style="background:#f8f9fa; border-bottom:2px solid #dfe6e9;">
                                        <th style="padding:10px; text-align:left;">문제 내용 및 정답</th>
                                        <th style="padding:10px; width:12%;">도전 횟수</th>
                                        <th style="padding:10px; width:12%; color:var(--pk-green);">정답 횟수</th>
                                        <th style="padding:10px; width:12%; color:var(--pk-red);">오답 횟수</th>
                                    </tr></thead><tbody>`;
                        
                        qArray.forEach((q, idx) => {
                            if(q) {
                                let qAtt = 0, qCorr = 0;
                                if(gym.requests) {
                                    Object.values(gym.requests).forEach(req => {
                                        if(req.status === 'completed' && req.qIdx === idx) {
                                            qAtt++;
                                            if(req.isCorrect) qCorr++;
                                        }
                                    });
                                }
                                let qWrong = qAtt - qCorr;
                                
                                qHtml += `<tr style="border-bottom:1px solid #f1f2f6;">
                                    <td style="padding:10px; text-align:left;">
                                        <b>Q${idx+1} (${q.score}점):</b> ${q.text}<br>
                                        <span style="color:var(--pk-blue); font-weight:bold;">정답: ${q.answer}</span>`;
                                
                                if(q.sub && q.sub.q && q.sub.q.trim() !== "") {
                                    qHtml += `<br><span style="color:#d35400; font-size:12px; font-weight:bold;">↳ 연계: ${q.sub.q} (정답: ${q.sub.a})</span>`;
                                }
                                qHtml += `</td>
                                    <td style="padding:10px; font-weight:bold;">${qAtt}</td>
                                    <td style="padding:10px; font-weight:bold; color:var(--pk-green);">${qCorr}</td>
                                    <td style="padding:10px; font-weight:bold; color:var(--pk-red);">${qWrong}</td>
                                </tr>`;
                            }
                        });
                        qHtml += `</tbody></table>`;
                    }
                    
                    // ★ 비밀번호 터치(클릭) 토글 기능 (user-select:none 으로 드래그 방지)
                    const pwToggleHtml = `<span onclick="event.preventDefault(); event.stopPropagation(); this.innerText = this.innerText === '****' ? '${gym.code||'-'}' : '****';" style="background:#fff; border:1px solid #ffcccc; padding:2px 6px; border-radius:4px; cursor:pointer; user-select:none;" title="눌러서 확인">****</span>`;

                    container.innerHTML += `
                        <details style="border: 2px solid var(--pk-border); border-radius: 12px; background: white; overflow: hidden;">
                            <summary style="padding: 15px; cursor: pointer; background: #f1f2f6; outline: none; display: flex; justify-content: space-between; align-items: center; font-weight: bold;">
                                <span>🏛️ ${gName} <small style="color:var(--pk-red); font-family:monospace; margin-left:5px;">(PW: ${pwToggleHtml})</small></span>
                                <span style="font-size:13px; color:#555; background:white; padding:4px 8px; border-radius:8px; border:1px solid #ccc;">
                                    출제: ${qCount} | 피격: ${att}회 | <span style="color:${defenseRate >= 50 ? 'var(--pk-red)' : '#555'}">방어율: ${defenseRate}%</span>
                                </span>
                            </summary>
                            <div style="padding: 15px; border-top: 1px solid #eee; background:#fff;">
                                ${qHtml || '<p style="color:#999; font-size:13px; margin:0;">아직 출제된 문제가 없습니다.</p>'}
                            </div>
                        </details>
                    `;
                });
            } else {
                // [과거 라운드]
                const hist = roundHistoryList.find(h => h.roundNumber === targetRound);
                if(!hist || !hist.gymStats) { container.innerHTML = '<p style="text-align:center; color:#999;">이 라운드의 체육관 데이터가 없습니다.</p>'; return; }
                
                const gymNames = Object.keys(hist.gymStats).filter(k => k !== 'undefined' && k !== 'null' && k.trim() !== '');
                if(gymNames.length === 0) { container.innerHTML = '<p style="text-align:center; color:#999;">이 라운드의 체육관 데이터가 없습니다.</p>'; return; }

                gymNames.forEach(gName => {
                    const qArray = hist.gymStats[gName];
                    let att = 0, corr = 0;
                    qArray.forEach(q => { att += q.attempts; corr += q.corrects; });
                    const wrongCount = att - corr;
                    const defenseRate = att === 0 ? 0 : Math.round((wrongCount / att) * 100);
                    const qCount = qArray.length;

                    let qHtml = `<table style="width:100%; border-collapse:collapse; text-align:center; font-size:13px; border:1px solid #dfe6e9;">
                                    <thead><tr style="background:#f8f9fa; border-bottom:2px solid #dfe6e9;">
                                        <th style="padding:10px; text-align:left;">문제 내용 및 정답</th>
                                        <th style="padding:10px; width:12%;">도전 횟수</th>
                                        <th style="padding:10px; width:12%; color:var(--pk-green);">정답 횟수</th>
                                        <th style="padding:10px; width:12%; color:var(--pk-red);">오답 횟수</th>
                                    </tr></thead><tbody>`;
                    
                    qArray.forEach(q => {
                        let qWrong = q.attempts - q.corrects;
                        qHtml += `<tr style="border-bottom:1px solid #f1f2f6;">
                            <td style="padding:10px; text-align:left;">
                                <b>Q${q.qNum} (${q.score}점):</b> ${q.text}<br>
                                <span style="color:var(--pk-blue); font-weight:bold;">정답: ${q.answer}</span>`;
                        if(q.subQ && q.subQ !== "-") qHtml += `<br><span style="color:#d35400; font-size:12px; font-weight:bold;">↳ 연계: ${q.subQ} (정답: ${q.subA})</span>`;
                        qHtml += `</td>
                            <td style="padding:10px; font-weight:bold;">${q.attempts}</td>
                            <td style="padding:10px; font-weight:bold; color:var(--pk-green);">${q.corrects}</td>
                            <td style="padding:10px; font-weight:bold; color:var(--pk-red);">${qWrong}</td>
                        </tr>`;
                    });
                    qHtml += `</tbody></table>`;

                    container.innerHTML += `
                        <details style="border: 2px solid var(--border-light); border-radius: 12px; background: white; overflow: hidden;">
                            <summary style="padding: 15px; cursor: pointer; background: #f1f2f6; outline: none; display: flex; justify-content: space-between; align-items: center; font-weight: bold;">
                                <span>🏛️ ${gName} <small style="color:var(--pk-gray); font-size:12px;">(과거 기록)</small></span>
                                <span style="font-size:13px; color:#555; background:white; padding:4px 8px; border-radius:8px; border:1px solid #ccc;">
                                    출제: ${qCount} | 피격: ${att}회 | <span style="color:${defenseRate >= 50 ? 'var(--pk-red)' : '#555'}">방어율: ${defenseRate}%</span>
                                </span>
                            </summary>
                            <div style="padding: 15px; border-top: 1px solid #eee; background:#fff;">${qHtml}</div>
                        </details>
                    `;
                });
            }
        }

        function resetGymPassword(targetGymName) {
            if(confirm(`🔄 [${targetGymName}] 체육관의 비밀번호를 '1111'로 초기화하시겠습니까?`)) {
                db.ref('gyms/' + targetGymName).update({ code: "1111" })
                  .then(() => alert(`✅ [${targetGymName}] 비밀번호가 '1111'로 초기화되었습니다!\n학생들에게 '1111'로 접속 후 [정보 수정]에서 비밀번호를 다시 설정하라고 안내해주세요.`))
                  .catch(err => alert("초기화 중 오류가 발생했습니다."));
            }
        }

        function deleteGym(targetGymName) {
            if(confirm(`⚠️ 정말로 [${targetGymName}] 체육관을 삭제하시겠습니까?\n이 작업은 되돌릴 수 없으며, 아이들이 튕겨 나갈 수 있습니다.`)) {
                db.ref('gyms/' + targetGymName).remove()
                  .then(() => alert(`🗑️ [${targetGymName}] 삭제 완료!`))
                  .catch(err => alert("삭제 중 오류가 발생했습니다."));
            }
        }

        function saveAndResetRound() {
            if(Object.keys(currentGymsData).length === 0) return alert("현재 개설된 체육관 데이터가 없습니다.");
            const wantReset = confirm("라운드를 종료하고 리셋하시겠습니까?\n(다음 라운드를 위해 아이들의 점수와 풀이 기록이 0으로 초기화됩니다.)");
            if(!wantReset) return;
            const wantSave = confirm("이번 라운드의 배틀 결과를 '리포트 보관함'에 저장하시겠습니까?\n\n[확인] = 리포트 저장 후 리셋 진행\n[취소] = 저장하지 않고 쿨하게 리셋 (실수/테스트용)");

            if(wantSave) {
                let teamScores = {}; let allRequestsLog = [];
                Object.keys(currentGymsData).forEach(gName => { teamScores[gName] = 0; });
                
                Object.values(currentGymsData).forEach(gym => {
                    if(gym.requests) { 
                        Object.values(gym.requests).forEach(req => { 
                            if(req.status === 'completed') { 
                                if(teamScores[req.team] === undefined) teamScores[req.team] = 0; 
                                teamScores[req.team] += (req.scoreDelta || 0); 
                            } 
                        }); 
                    }
                });

                let gymDetailedStats = {};
                Object.keys(currentGymsData).forEach(gName => {
                    const gym = currentGymsData[gName]; gymDetailedStats[gName] = [];
                    if(gym.questions) {
                        const qArray = Array.isArray(gym.questions) ? gym.questions : Object.values(gym.questions);
                        qArray.forEach((q, qIdx) => {
                            if(!q) return; let attempts = 0; let corrects = 0;
                            if(gym.requests) { 
                                Object.values(gym.requests).forEach(req => { 
                                    if(req.status === 'completed' && req.qIdx === qIdx) { 
                                        attempts++; if(req.isCorrect) corrects++; 
                                        allRequestsLog.push({ attacker: req.team, targetGym: gName, qNum: qIdx + 1, isCorrect: req.isCorrect, scoreDelta: req.scoreDelta });
                                    } 
                                }); 
                            }
                            let accStr = attempts === 0 ? "0%" : Math.round((corrects / attempts) * 100) + "%";
                            gymDetailedStats[gName].push({ qNum: `Q${qIdx + 1}`, score: q.score > 0 ? `+${q.score}` : `${q.score}`, text: q.text, answer: q.answer, subQ: q.sub ? q.sub.q : "-", subA: q.sub ? q.sub.a : "-", attempts: attempts, corrects: corrects, accuracy: accStr });
                        });
                    }
                });

                const now = new Date(); const dateString = `${now.getFullYear()}.${String(now.getMonth()+1).padStart(2,'0')}.${String(now.getDate()).padStart(2,'0')} ${String(now.getHours()).padStart(2,'0')}:${String(now.getMinutes()).padStart(2,'0')}`;
                const customTitle = prompt("리포트 제목을 적어주세요.", `${currentRound}라운드 배틀 결과`);
                if(!customTitle) return; 

                const reportData = { roundIndex: currentRound, title: customTitle, dateString: dateString, timestamp: firebase.database.ServerValue.TIMESTAMP, scores: teamScores, gymStats: gymDetailedStats, attackLogs: allRequestsLog };
                
                db.ref('reports').push(reportData).then(() => { alert("✅ 리포트가 성공적으로 저장되었습니다!"); executeResetOnly(); });
            } else {
                executeResetOnly();
            }
        }

        function executeResetOnly() {
            let updates = {};
            Object.keys(currentGymsData).forEach(gName => { updates['gyms/' + gName + '/requests'] = null; updates['gyms/' + gName + '/status'] = 'setup'; });
            updates['globalConfig/status'] = 'setup'; 
            updates['globalConfig/currentRound'] = currentRound + 1;
            updates['globalConfig/roundResetTrigger'] = Date.now();
            
            db.ref().update(updates).then(() => {
                alert("✅ 라운드 리셋 완료! 관장 패드의 잠금이 해제되었습니다.");
                clearInterval(timerInterval); timerInterval = null; timeLeft = document.getElementById('timeLimit').value * 60; updateDisplay();
            });
        }

        function deleteReport(reportKey) {
            if(confirm("정말로 이 리포트를 삭제하시겠습니까? (복구할 수 없습니다)")) { db.ref('reports/' + reportKey).remove(); }
        }

        function openReportBoardModal() {
            const listArea = document.getElementById('reportListArea'); listArea.innerHTML = '';
            const reportKeys = Object.keys(allReports).reverse(); 
            if(reportKeys.length === 0) { listArea.innerHTML = '<p style="text-align:center; color:#aaa; font-weight:bold; padding:20px 0;">아직 저장된 리포트가 없습니다.</p>'; } 
            else {
                reportKeys.forEach(key => {
                    const rep = allReports[key]; const item = document.createElement('div'); item.className = 'report-item'; item.onclick = () => openReportDetailModal(key);
                    const teamCount = rep.scores ? Object.keys(rep.scores).length : 0;
                    item.innerHTML = `<div class="report-info"><h4>${rep.title}</h4><p>참가 모둠: ${teamCount}팀 | 저장: ${rep.dateString}</p></div><div style="display:flex; gap:8px;"><button class="btn btn-red" style="padding:6px 12px; font-size:13px;" onclick="event.stopPropagation(); deleteReport('${key}')">🗑️ 삭제</button><div style="background:var(--pk-blue); color:white; padding:6px 12px; border-radius:6px; font-weight:bold; font-size:13px;">결과 보기</div></div>`;
                    listArea.appendChild(item);
                });
            }
            document.getElementById('modalReportBoard').classList.add('open');
        }

        function openReportDetailModal(reportKey) {
            const rep = allReports[reportKey]; if(!rep || !rep.scores) return;
            document.getElementById('modalReportTitle').innerText = rep.title; document.getElementById('modalReportDate').innerText = `저장 일시: ${rep.dateString}`;
            const scoreArray = Object.keys(rep.scores).map(t => ({ team: t, score: rep.scores[t] })); scoreArray.sort((a, b) => b.score - a.score);
            const tbody = document.getElementById('reportTableBody'); tbody.innerHTML = '';
            scoreArray.forEach((item, index) => {
                let rankStr = `${index + 1}위`; if(index === 0) rankStr = `🥇 1위`; if(index === 1) rankStr = `🥈 2위`; if(index === 2) rankStr = `🥉 3위`;
                const tr = document.createElement('tr'); tr.innerHTML = `<td>${rankStr}</td><td style="font-weight:bold;">${item.team}</td><td>${item.score > 0 ? '+' + item.score : item.score}점</td>`; tbody.appendChild(tr);
            });
            const btnExcel = document.getElementById('btnDownloadSingleExcel'); btnExcel.onclick = () => downloadSingleExcel(rep);
            document.getElementById('modalReportDetail').classList.add('open');
        }

        function downloadSingleExcel(repData) {
            try {
                if(!repData || !repData.scores) return alert("데이터가 불완전하여 엑셀을 생성할 수 없습니다.");
                const wb = XLSX.utils.book_new();
                const scoreArray = Object.keys(repData.scores).map((t, idx) => ({ "순위": "", "모둠명": t, "최종 획득 점수": repData.scores[t] }));
                scoreArray.sort((a, b) => b["최종 획득 점수"] - a["최종 획득 점수"]); scoreArray.forEach((item, idx) => item["순위"] = `${idx + 1}위`);
                const wsRank = XLSX.utils.json_to_sheet(scoreArray); XLSX.utils.book_append_sheet(wb, wsRank, "종합 순위");
                let detailData = [];
                if(repData.gymStats) {
                    Object.keys(repData.gymStats).forEach(gName => { 
                        if(repData.gymStats[gName]) {
                            repData.gymStats[gName].forEach(q => { 
                                detailData.push({ "체육관명": gName, "문항 번호": q.qNum, "배점": q.score, "본 문제 내용": q.text, "본 문제 정답": q.answer, "연계 방어 문제": q.subQ || '-', "연계 방어 정답": q.subA || '-', "도전 횟수": (q.attempts||0) + "회", "정답 횟수": (q.corrects||0) + "회", "정답률": q.accuracy || '0%' }); 
                            });
                        }
                    }); 
                }
                if(detailData.length > 0) {
                    const wsDetail = XLSX.utils.json_to_sheet(detailData); XLSX.utils.book_append_sheet(wb, wsDetail, "문항 상세 분석");
                }
                const safeTitle = (repData.title || "배틀리포트").replace(/[^a-z0-9가-힣]/gi, '_'); XLSX.writeFile(wb, `${safeTitle}_리포트.xlsx`);
            } catch (e) {
                console.error(e); alert("엑셀 파일 생성 중 오류가 발생했습니다. (과거 버전 데이터 호환성 문제)");
            }
        }

        function downloadAllRoundsExcel() {
            try {
                const reportKeys = Object.keys(allReports); if(reportKeys.length === 0) return alert("보관함에 저장된 데이터가 없습니다.");
                const wb = XLSX.utils.book_new();
                
                let masterScoreBoard = {};
                reportKeys.forEach(key => { 
                    const rep = allReports[key]; 
                    if(rep && rep.scores) {
                        Object.keys(rep.scores).forEach(team => { 
                            if(!masterScoreBoard[team]) masterScoreBoard[team] = 0; 
                            masterScoreBoard[team] += rep.scores[team]; 
                        }); 
                    }
                });
                let finalSummaryArray = Object.keys(masterScoreBoard).map((team, idx) => ({ "누적 순위": "", "모둠명": team, "누적 총점": masterScoreBoard[team] + "점" }));
                finalSummaryArray.sort((a,b) => parseInt(b["누적 총점"]) - parseInt(a["누적 총점"])); finalSummaryArray.forEach((item, idx) => item["누적 순위"] = `${idx+1}위`);
                const wsTotal = XLSX.utils.json_to_sheet(finalSummaryArray); XLSX.utils.book_append_sheet(wb, wsTotal, "🌟 누적 종합 순위");
                
                reportKeys.forEach((key) => {
                    const rep = allReports[key]; 
                    if(!rep) return;
                    const roundNum = rep.roundIndex || 1; let roundRows = [];
                    roundRows.push({ A: `🏆 [${roundNum}라운드 모둠별 순위표]`, B: "", C: "" }); roundRows.push({ A: "순위", B: "모둠명", C: "획득 점수" });
                    
                    if(rep.scores) {
                        const rScoreArr = Object.keys(rep.scores).map(t => ({ team: t, score: rep.scores[t] })).sort((a,b)=>b.score-a.score);
                        rScoreArr.forEach((item, idx) => { roundRows.push({ A: `${idx+1}위`, B: item.team, C: item.score + "점" }); });
                    }
                    roundRows.push({ A: "", B: "", C: "" }); 
                    
                    roundRows.push({ A: "📝 [체육관별 문제 출제 및 정답률 분석]", B: "", C: "" }); roundRows.push({ A: "체육관명", B: "문항", C: "배점", D: "문제 내용", E: "정답", F: "연계 질문", G: "연계 정답", H: "도전 횟수", I: "정답률" });
                    if(rep.gymStats) { 
                        Object.keys(rep.gymStats).forEach(gName => { 
                            if(rep.gymStats[gName]) {
                                rep.gymStats[gName].forEach(q => { 
                                    roundRows.push({ A: gName, B: q.qNum, C: q.score, D: q.text, E: q.answer, F: q.subQ||'-', G: q.subA||'-', H: (q.attempts||0) + "회", I: q.accuracy||'0%' }); 
                                }); 
                            }
                        }); 
                    }
                    const wsRound = XLSX.utils.json_to_sheet(roundRows, { skipHeader: true }); XLSX.utils.book_append_sheet(wb, wsRound, `${roundNum}라운드 문항분석`);
                });

                let attackRows = [];
                attackRows.push({ A: "라운드", B: "도전자(모둠명)", C: "타겟 체육관명", D: "도전 문항", E: "판정 결과", F: "획득 점수" });
                reportKeys.forEach((key) => {
                    const rep = allReports[key];
                    if(rep && rep.attackLogs && Array.isArray(rep.attackLogs)) {
                        rep.attackLogs.forEach(log => {
                            attackRows.push({
                                A: `${rep.roundIndex||1}라운드`,
                                B: log.attacker || '-',
                                C: log.targetGym || '-',
                                D: log.qNum ? `Q${log.qNum}` : '-',
                                E: log.isCorrect ? "정답" : "오답(방어)",
                                F: (log.scoreDelta || 0) + "점"
                            });
                        });
                    }
                });
                if(attackRows.length > 1) {
                    const wsAttacks = XLSX.utils.json_to_sheet(attackRows, { skipHeader: true }); XLSX.utils.book_append_sheet(wb, wsAttacks, "체육관 도전 이력");
                }

                const now = new Date(); XLSX.writeFile(wb, `역사배틀_전체라운드_종합마스터_${now.getMonth()+1}월${now.getDate()}일.xlsx`);
            } catch (e) {
                console.error(e); alert("엑셀 파일 생성 중 오류가 발생했습니다. (과거 버전 데이터 호환성 문제)");
            }
        }

        function resetClassData() {
            const pwd = prompt("🚨 [학급 전면 초기화]\n모든 체육관과 문제를 삭제하고 처음 로그인 화면으로 내쫓습니다.\n계속하시려면 '초기화' 라고 입력하세요.");
            if(pwd === "초기화") {
                db.ref('globalConfig').update({ status: 'reset', classResetTrigger: Date.now() });
                db.ref('gyms').remove().then(() => {
                    alert("💥 학급 리셋 완료! 교실 내 모든 패드가 첫 화면으로 자동 튕겨 나갔습니다.");
                    document.getElementById('dashboardScreen').classList.add('hidden');
                    document.getElementById('setupScreen').classList.remove('hidden');
                    document.getElementById('btnSidebar').classList.add('hidden');
                    clearInterval(timerInterval); timerInterval = null;
                });
            }
        }
    </script>
</body>
